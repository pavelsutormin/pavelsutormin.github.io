<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mablerun JS</title>
    <link class="favicon" rel="icon" href="/favicon.png">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="style.css">
    <script src="/static/planck.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  </head>
  <body>
    <script src="/navbar.js"></script>
    <div class="content">
      <div class="game-content">
        <canvas id="gameCanvas" oncontextmenu="return false;"></canvas>
        <div id="controls">
          <button id="buttonRun">Run</button>
          <button id="buttonClear">Clear</button>
          <br>
          <button id="buttonSave">Save</button>
          <button id="buttonLoad">Load</button>
          <br>
          <button id="buttonExport">Export</button>
          <button id="buttonImport">Import</button>
          <br>
          <button id="buttonPublish" style="width: 230px;">Publish</button>
          <br>
          <input id="inputMarblerunAt" type="text" placeholder="Level Id" style="height: 50px;"></input>
          <button id="buttonMarblerunAt" style="height: 50px;">Load from marblerun.at</button>
          <br>
          <canvas id="floatingBrickSrc0" class="floatingBrickSrc"></canvas>
          <canvas id="floatingBrickSrc1" class="floatingBrickSrc"></canvas>
          <canvas id="floatingBrickSrc2" class="floatingBrickSrc"></canvas>
          <br>
          <canvas id="floatingBrickSrc3" class="floatingBrickSrc"></canvas>
          <canvas id="floatingBrickSrc4" class="floatingBrickSrc"></canvas>
          <canvas id="floatingBrickSrc5" class="floatingBrickSrc"></canvas>
          <br>
          <canvas id="floatingBrickSrc6" class="floatingBrickSrc"></canvas>
          <canvas id="floatingBrickSrc7" class="floatingBrickSrc"></canvas>
          <canvas id="floatingBrickSrc8" class="floatingBrickSrc"></canvas>
          <br>
          <canvas id="floatingBrickSrc9" class="floatingBrickSrc"></canvas>
          <canvas id="floatingBrickSrc10" class="floatingBrickSrc floatingBrickSrcLong"></canvas>
        </div>
        <canvas id="floatingBrick" style="visibility: hidden;"></canvas>
      </div>
      <p style="font-size: 22; display: block;" class="elapsed-time">Elapsed time: <span id="totalTime">0.00</span></p>
      <br>
    </div>
    <script src="utils.js"></script>
    <script src="draw.js"></script>
    <script src="phys.js"></script>
    <script src="main.js"></script>
  </body>
</html>
